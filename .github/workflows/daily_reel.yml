name: Post Daily Word Reel

# ─────────────────────────────────────────────────────────────────────────────
#  8 posts per day — cron times scheduled ~40 min early to account for
#  GitHub Actions queue delay on the free tier.
#
#  Cron (UTC)   │ Fires (UTC)  │ ~Post time (IST, +5:30 + ~40 min queue)
#  ─────────────┼──────────────┼──────────────────────────────────────────────
#  50 0 * * *   │ 00:50 UTC    │ ~07:00 IST  — early morning
#  50 2 * * *   │ 02:50 UTC    │ ~09:00 IST  — morning commute
#  50 4 * * *   │ 04:50 UTC    │ ~11:00 IST  — mid morning
#  50 6 * * *   │ 06:50 UTC    │ ~13:00 IST  — lunch break
#  50 8 * * *   │ 08:50 UTC    │ ~15:00 IST  — afternoon
#  50 11 * * *  │ 11:50 UTC    │ ~18:00 IST  — evening peak
#  50 13 * * *  │ 13:50 UTC    │ ~20:00 IST  — prime time
#  50 15 * * *  │ 15:50 UTC    │ ~22:00 IST  — night audience
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "50 0  * * *"
    - cron: "50 2  * * *"
    - cron: "50 4  * * *"
    - cron: "50 6  * * *"
    - cron: "50 8  * * *"
    - cron: "50 10  * * *"
    - cron: "50 12  * * *"
    - cron: "50 14 * * *"
  workflow_dispatch: # also allows manual "Run workflow" in the UI

jobs:
  post-reel:
    runs-on: ubuntu-latest
    # Give the job up to 30 min (TTS model download + render can be slow)
    timeout-minutes: 30

    steps:
      # ── 1. Source code ────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Python ─────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Python deps ────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            opencv-python-headless \
            pillow \
            numpy \
            requests \
            edge-tts

      # ── 4. System tools ───────────────────────────────────────────────────
      - name: Install system tools (ffmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg

      # ── 5. Fonts ──────────────────────────────────────────────────────────
      - name: Install Poppins fonts
        run: |
          mkdir -p /usr/share/fonts/truetype/google-fonts
          BASE="https://github.com/google/fonts/raw/main/ofl/poppins"
          for weight in Bold Medium Regular Light; do
            wget -q "${BASE}/Poppins-${weight}.ttf" \
                 -O "/usr/share/fonts/truetype/google-fonts/Poppins-${weight}.ttf"
          done
          fc-cache -fv

      # ── 6. (No model download needed — edge-tts uses Microsoft's API) ────────

      # ── 7. Generate and post reel ─────────────────────────────────────────
      - name: Generate and post reel
        env:
          INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python generate_reel.py

      # ── 8. Upload reel as artifact (keeps it for 3 days for debugging) ────
      - name: Upload rendered reel as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: word_reel_${{ github.run_id }}
          path: word_reel.mp4
          retention-days: 3
          if-no-files-found: warn
