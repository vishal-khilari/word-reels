name: Post Daily Word Reel

on:
  # 8 posts per day — scheduled 40 minutes EARLY to account for GitHub Actions
  # queue delay (typically 10-40 min on the free tier).
  #
  # All times in UTC. IST = UTC + 5:30
  #
  #  Cron (UTC)  │ Fires at (UTC) │ Actual post time (IST, after ~40 min delay)
  # ─────────────┼────────────────┼────────────────────────────────────────────
  #  50 0 * * *  │  00:50 UTC     │  ~07:00 IST  — early morning
  #  50 2 * * *  │  02:50 UTC     │  ~09:00 IST  — morning commute
  #  50 4 * * *  │  04:50 UTC     │  ~11:00 IST  — mid morning
  #  50 6 * * *  │  06:50 UTC     │  ~13:00 IST  — lunch break
  #  50 8 * * *  │  08:50 UTC     │  ~15:00 IST  — afternoon
  #  50 11 * * * │  11:50 UTC     │  ~18:00 IST  — evening peak
  #  50 13 * * * │  13:50 UTC     │  ~20:00 IST  — prime time
  #  50 15 * * * │  15:50 UTC     │  ~22:00 IST  — night audience
  schedule:
    - cron: "50 0  * * *"
    - cron: "50 2  * * *"
    - cron: "50 4  * * *"
    - cron: "50 6  * * *"
    - cron: "50 8  * * *"
    - cron: "50 11 * * *"
    - cron: "50 13 * * *"
    - cron: "50 15 * * *"
  workflow_dispatch:

jobs:
  post-reel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install opencv-python-headless pillow numpy requests

      - name: Install ffmpeg
        run: sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install Poppins fonts
        run: |
          mkdir -p /usr/share/fonts/truetype/google-fonts
          BASE="https://github.com/google/fonts/raw/main/ofl/poppins"
          for weight in Bold Medium Regular Light; do
            wget -q "${BASE}/Poppins-${weight}.ttf" \
                 -O "/usr/share/fonts/truetype/google-fonts/Poppins-${weight}.ttf"
          done
          fc-cache -fv

      - name: Generate and post reel
        env:
          INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python generate_reel.py
