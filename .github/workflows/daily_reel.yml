name: Post Daily Word Reel

on:
  schedule:
    - cron: "55 13 * * *"
  workflow_dispatch:

jobs:
  post-reel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install opencv-python-headless pillow numpy requests wonderwords

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Inject credentials
        env:
          INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
        run: |
          python - <<'EOF'
          import os
          token   = os.environ["INSTAGRAM_TOKEN"]
          user_id = os.environ["INSTAGRAM_USER_ID"]
          with open("instagram_uploader.py", "r") as f:
              content = f.read()
          content = content.replace("YOUR_LONG_LIVED_ACCESS_TOKEN", token)
          content = content.replace("YOUR_INSTAGRAM_USER_ID", user_id)
          with open("instagram_uploader.py", "w") as f:
              f.write(content)
          print(f"✅ Token injected (length: {len(token)})")
          print(f"✅ User ID injected (length: {len(user_id)})")
          EOF

      - name: Generate and post reel
        run: python generate_reel.py
