name: Post Daily Word Reel

on:
  schedule:
    - cron: "55 13 * * *"
  workflow_dispatch:

jobs:
  post-reel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install opencv-python-headless pillow numpy requests wonderwords

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

        - name: Install Poppins fonts
          run: |
            sudo apt-get install -y fonts-google
            fc-cache -fv

      - name: Generate and post reel
        run: python generate_reel.py
